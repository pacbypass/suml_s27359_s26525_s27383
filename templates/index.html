<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat/Dog Breed Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .upload-form {
            margin: 20px 0;
            padding: 20px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            text-align: center;
        }
        .upload-form input[type="file"] {
            margin: 10px 0;
        }
        .upload-form button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .upload-form button:hover {
            background-color: #45a049;
        }
        .results {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
            display: none;
        }
        .results h3 {
            margin-top: 0;
        }
        .result-item {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #4CAF50;
        }
        .progress-bar {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            height: 20px;
            margin: 5px 0;
        }
        .progress-fill {
            height: 100%;
            background-color: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }
        .image-preview {
            max-width: 300px;
            max-height: 300px;
            margin: 20px auto;
            display: block;
        }
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cat/Dog Breed Classifier</h1>
        <p>Upload an image of a cat or dog, and the model will predict its breed.</p>

        <div class="upload-form">
            <input type="file" id="fileInput" accept="image/*">
            <br>
            <button onclick="uploadImage()">Classify</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing image...</p>
        </div>

        <div id="imagePreviewContainer" style="display: none;">
            <h3>Preview</h3>
            <img id="imagePreview" class="image-preview" src="" alt="Preview">
        </div>

        <div class="error" id="error" style="display: none;"></div>

        <div class="results" id="results">
            <h3>Top Predictions</h3>
            <div id="predictionsList"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const resultsDiv = document.getElementById('results');
        const predictionsList = document.getElementById('predictionsList');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreviewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);
                errorDiv.style.display = 'none';
                resultsDiv.style.display = 'none';
            }
        });

        async function uploadImage() {
            const file = fileInput.files[0];
            if (!file) {
                showError('Please select an image file.');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            loading.style.display = 'block';
            errorDiv.style.display = 'none';
            resultsDiv.style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(err || 'Server error');
                }

                const predictions = await response.json();
                displayResults(predictions);
            } catch (error) {
                showError(error.message || 'Failed to classify image.');
            } finally {
                loading.style.display = 'none';
            }
        }

        function displayResults(predictions) {
            predictionsList.innerHTML = '';
            predictions.forEach(pred => {
                const item = document.createElement('div');
                item.className = 'result-item';
                const percent = (pred.probability * 100).toFixed(2);
                item.innerHTML = `
                    <strong>${pred.class_name}</strong> (${pred.class_idx})
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percent}%"></div>
                    </div>
                    <span>${percent}%</span>
                `;
                predictionsList.appendChild(item);
            });
            resultsDiv.style.display = 'block';
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
